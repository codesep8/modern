<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./css/output.css" rel="stylesheet">
  <script src="//unpkg.com/alpinejs" defer></script>
</head>
<body class="thetree-dark-mode">
<div class="bg-neutral-100 dark:bg-neutral-900 w-full min-h-screen">
    <header class="bg-white dark:bg-black text-black dark:text-white">
        <div class="container mx-auto px-4">
            <nav class="flex items-center justify-between h-16">
              <div class="flex items-center" >
                <a href="/" class="text-2xl font-bold">wiki</a>
                <div class="hidden md:flex ml-4 space-x-4">
                  <a href="/RecentChanges" class="text-md font-bold flex gap-1 items-center hover:bg-neutral-100 dark:hover:bg-neutral-900 p-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-clock2-icon lucide-clock-2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 10"/></svg>
                    최근 변경
                  </a>
                  <a href="/RecentDiscuss" class="text-md font-bold flex gap-1 items-center hover:bg-neutral-100 dark:hover:bg-neutral-900 p-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-message-circle-icon lucide-message-circle"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
                    최근 토론
                  </a>
                </div>
              </div>
              <div class="flex items-center space-x-4">
                <div x-data="{ menuOpen: false }" class="md:hidden">
                  <button class="p-2" @click="menuOpen != menuOpen">open</button>
                  <div
                  x-show="menuOpen"
                  x-transition:enter="transition ease-out duration-300"
                  x-transition:enter-start="transform translate-x-full"
                  x-transition:enter-end="transform translate-x-0"
                  x-transition:leave="transition ease-in duration-300"
                  x-transition:leave-start="transform translate-x-0"
                  x-transition:leave-end="transform translate-x-full"
                  @click.away="menuOpen = false"
                  class="fixed inset-y-0 right-0 w-64 bg-white dark:bg-black z-60"
                  >
                    x
                  </div>
                </div>
              </div>
            </nav>
        </div>
    </header>
    <main class="w-full text-black dark:text-white">
      <div class="flex flex-col md:flex-row gap-4 w-full items-start">
        <div id="content" class="bg-neutral-50 dark:bg-neutral-950 rounded-xl border border-neutral-800 shadow-lg w-full mt-2 min-h-lvh md:mt-4 md:ml-4 md:2-3/4">
          <div class="p-6">
            <div class="flex flex-col md:flex-row border-b border-neutral-800">
              <h1 class="font-bold text-3xl mb-3">title</h1>
            </div>
          </div>
        </div>
        <div class="bg-neutral-50 dark:bg-neutral-950 rounded-xl border border-neutral-800 shadow-lg flex flex-col gap-4 w-full md:mr-4 md:mt-4 md:w-1/4">
          djlndfjokjoadfjokfaddjasdf

          sadfvadsv

          asdfasdfssd

          asdfsrd
        </div>
      </div>
    </main>
    <footer class="mt-4 bg-white dark:bg-black text-black dark:text-white h-35">
      hi
    </footer>
  </div>
</body>
</html>
